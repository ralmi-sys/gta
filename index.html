<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструменты Брокера | Professional Real Estate Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #b2945e;
            --bg: #f4f7f6;
            --text: #333;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; }

        header { background: var(--primary); color: var(--white); padding: 2rem 1rem; text-align: center; border-bottom: 5px solid var(--accent); }
        header h1 { font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px; }
        header p { opacity: 0.8; font-weight: 300; }

        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }

        .card { background: var(--white); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { color: var(--primary); margin-bottom: 1.5rem; border-left: 4px solid var(--accent); padding-left: 10px; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--accent); }

        .result { margin-top: 1.5rem; padding: 1rem; background: #f9f9f9; border-radius: 6px; text-align: center; }
        .result span { display: block; font-size: 1.4rem; font-weight: 700; color: var(--primary); }
        .result label { color: #777; margin-bottom: 0; }

        .btn { display: block; width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.3s; margin-top: 1rem; }
        .btn:hover { background: #2a3a7c; }

        footer { text-align: center; padding: 3rem 1rem; color: #777; font-size: 0.9rem; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>BrokerAssistant Pro</h1>
    <p>Профессиональный набор инструментов для реэлторов и брокеров</p>
</header>

<div class="container">
    <div class="grid">
        
        <div class="card">
            <h3>Ипотечный калькулятор</h3>
            <div class="form-group">
                <label>Стоимость недвижимости (₽)</label>
                <input type="number" id="m-price" value="5000000">
            </div>
            <div class="form-group">
                <label>Первоначальный взнос (₽)</label>
                <input type="number" id="m-down" value="1000000">
            </div>
            <div class="form-group">
                <label>Процентная ставка (%)</label>
                <input type="number" id="m-rate" value="12" step="0.1">
            </div>
            <div class="form-group">
                <label>Срок (лет)</label>
                <input type="number" id="m-term" value="20">
            </div>
            <button class="btn" onclick="calcMortgage()">Рассчитать платеж</button>
            <div class="result">
                <label>Ежемесячный платеж:</label>
                <span id="m-result">0 ₽</span>
            </div>
        </div>

        <div class="card">
            <h3>Расчет комиссии</h3>
            <div class="form-group">
                <label>Цена сделки (₽)</label>
                <input type="number" id="c-price" value="10000000">
            </div>
            <div class="form-group">
                <label>Ваш процент (%)</label>
                <input type="number" id="c-percent" value="3" step="0.1">
            </div>
            <div class="form-group">
                <label>Доля агентства (%, если есть)</label>
                <input type="number" id="c-split" value="0">
            </div>
            <button class="btn" onclick="calcCommission()">Посчитать доход</button>
            <div class="result">
                <label>Ваша чистая прибыль:</label>
                <span id="c-result">0 ₽</span>
            </div>
        </div>

        <div class="card">
            <h3>Инвест-доходность (ROI)</h3>
            <div class="form-group">
                <label>Стоимость объекта (₽)</label>
                <input type="number" id="i-price" value="8000000">
            </div>
            <div class="form-group">
                <label>Аренда в месяц (₽)</label>
                <input type="number" id="i-rent" value="50000">
            </div>
            <div class="form-group">
                <label>Расходы в год (налоги, ремонт ₽)</label>
                <input type="number" id="i-exp" value="60000">
            </div>
            <button class="btn" onclick="calcROI()">Рассчитать годовые</button>
            <div class="result">
                <label>Годовая доходность:</label>
                <span id="i-result">0 %</span>
            </div>
        </div>

    </div>
</div>

<footer>
    <p>&copy; 2026 BrokerAssistant Pro. Разработано для профессионалов рынка недвижимости.</p>
</footer>

<script>
    function formatMoney(num) {
        return num.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " ₽";
    }

    function calcMortgage() {
        const price = document.getElementById('m-price').value;
        const down = document.getElementById('m-down').value;
        const rate = document.getElementById('m-rate').value / 100 / 12;
        const term = document.getElementById('m-term').value * 12;
        
        const loan = price - down;
        const payment = (loan * rate * Math.pow(1 + rate, term)) / (Math.pow(1 + rate, term) - 1);
        
        document.getElementById('m-result').innerText = formatMoney(payment);
    }

    function calcCommission() {
        const price = document.getElementById('c-price').value;
        const percent = document.getElementById('c-percent').value / 100;
        const split = document.getElementById('c-split').value / 100;
        
        const totalComm = price * percent;
        const myPart = totalComm * (1 - split);
        
        document.getElementById('c-result').innerText = formatMoney(myPart);
    }

    function calcROI() {
        const price = parseFloat(document.getElementById('i-price').value);
        const rent = parseFloat(document.getElementById('i-rent').value);
        const exp = parseFloat(document.getElementById('i-exp').value);
        
        const annualIncome = (rent * 12) - exp;
        const roi = (annualIncome / price) * 100;
        
        document.getElementById('i-result').innerText = roi.toFixed(2) + " % годовых";
    }

    // Инициализация расчетов при загрузке
    window.onload = function() {
        calcMortgage();
        calcCommission();
        calcROI();
    };
</script>

</body>
</html>
