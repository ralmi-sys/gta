<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NFS: Most Wanted - Web Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
        #ui { position: absolute; bottom: 20px; right: 20px; color: #fff; text-align: right; pointer-events: none; }
        #speedo { font-size: 48px; font-weight: bold; font-style: italic; text-shadow: 2px 2px #f00; }
        #nitro-bar { width: 200px; height: 10px; border: 2px solid #fff; margin-top: 5px; background: rgba(0,0,0,0.5); }
        #nitro-fill { width: 100%; height: 100%; background: #00f; transition: width 0.1s; }
        #heat { position: absolute; top: 20px; right: 20px; color: #fb0; font-size: 24px; font-weight: bold; }
        canvas { display: block; }
        .instructions { position: absolute; top: 10px; left: 10px; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>

<div class="instructions">WASD - Управление | SHIFT - Ручник | SPACE - НИТРО</div>
<div id="heat">HEAT: 1</div>
<div id="ui">
    <div id="speedo">0 KM/H</div>
    <div id="nitro-bar"><div id="nitro-fill"></div></div>
    <div>NITROUS</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/**
 * ГЕЙМ-ЛОГИКА: NFS WEB EDITION
 */

// 1. Инициализация сцены
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 100);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x111111);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// 2. Освещение
const ambient = new THREE.AmbientLight(0x404040, 2);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10, 20, 10);
sun.castShadow = true;
scene.add(sun);

// 3. Создание города (Простая сетка)
const roadGeo = new THREE.PlaneGeometry(2000, 2000);
const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
const ground = new THREE.Mesh(roadGeo, roadMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

function createBuildings() {
    const bGeo = new THREE.BoxGeometry(1, 1, 1);
    for(let i = 0; i < 200; i++) {
        const h = 5 + Math.random() * 15;
        const material = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const building = new THREE.Mesh(bGeo, material);
        
        let x = (Math.random() - 0.5) * 400;
        let z = (Math.random() - 0.5) * 400;
        
        // Оставляем дорогу пустой (упрощенно)
        if (Math.abs(x) < 10) x += 20; 
        
        building.scale.set(10, h, 10);
        building.position.set(x, h/2, z);
        building.castShadow = true;
        scene.add(building);
    }
}
createBuildings();

// 4. Машина игрока (BMW M3 GTR Style)
const carGroup = new THREE.Group();
const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, 0.6, 4),
    new THREE.MeshStandardMaterial({ color: 0x1133ff })
);
body.position.y = 0.5;
body.castShadow = true;
carGroup.add(body);

// Полоски
const stripe = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.61, 4.05),
    new THREE.MeshStandardMaterial({ color: 0xcccccc })
);
stripe.position.y = 0.5;
carGroup.add(stripe);

scene.add(carGroup);

// 5. Управление и Физика
const keys = {};
window.addEventListener('keydown', (e) => keys[e.code] = true);
window.addEventListener('keyup', (e) => keys[e.code] = false);

let velocity = 0;
let rotation = 0;
const stats = {
    maxSpeed: 1.2,
    accel: 0.005,
    decel: 0.002,
    nitro: 100,
    isNitro: false
};

// 6. Игровой цикл
function update() {
    // Движение
    if (keys['KeyW']) velocity += stats.accel * (stats.isNitro ? 2 : 1);
    if (keys['KeyS']) velocity -= stats.accel;
    
    // Трение
    velocity *= 0.98;

    // Повороты (только в движении)
    if (Math.abs(velocity) > 0.01) {
        const steerDir = velocity > 0 ? 1 : -1;
        if (keys['KeyA']) rotation += 0.04 * steerDir;
        if (keys['KeyD']) rotation -= 0.04 * steerDir;
    }

    // Ручник
    if (keys['ShiftLeft']) velocity *= 0.95;

    // Нитро
    if (keys['Space'] && stats.nitro > 0) {
        stats.isNitro = true;
        stats.nitro -= 0.5;
        camera.fov = 85; // Эффект скорости
    } else {
        stats.isNitro = false;
        if (stats.nitro < 100) stats.nitro += 0.1;
        camera.fov = 75;
    }
    camera.updateProjectionMatrix();

    // Обновление позиции
    carGroup.position.x += Math.sin(rotation) * velocity;
    carGroup.position.z += Math.cos(rotation) * velocity;
    carGroup.rotation.y = rotation;

    // Камера (Follow)
    const camOffset = new THREE.Vector3(
        -Math.sin(rotation) * 10,
        5,
        -Math.cos(rotation) * 10
    );
    camera.position.lerp(carGroup.position.clone().add(camOffset), 0.1);
    camera.lookAt(carGroup.position);

    // UI
    document.getElementById('speedo').innerText = Math.round(Math.abs(velocity) * 200) + " KM/H";
    document.getElementById('nitro-fill').style.width = stats.nitro + "%";

    renderer.render(scene, camera);
    requestAnimationFrame(update);
}

// Ресайз
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

update();
</script>
</body>
</html>
