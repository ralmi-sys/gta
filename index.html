<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Neon Cyber GTA</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #0ff;
            text-shadow: 0 0 10px #0ff; pointer-events: none;
        }
        .stat { font-size: 24px; margin-bottom: 5px; }
        #loading {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; justify-content: center; align-items: center; color: #fff; z-index: 100;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="loading">INITIALIZING NEON CITY...</div>

<div id="ui">
    <div class="stat" id="money">$000,500</div>
    <div class="stat" id="speed">0 KM/H</div>
    <div style="width: 200px; height: 10px; border: 1px solid #0ff;">
        <div id="hp-bar" style="width: 100%; height: 100%; background: #0ff;"></div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- КОНФИГУРАЦИЯ ---
    let scene, camera, renderer, composer, clock;
    let player, car, cityGroup;
    let buildings = [];
    const input = { forward: false, backward: false, left: false, right: false };

    // Состояние авто
    const carPhysics = {
        speed: 0,
        acceleration: 0.005,
        friction: 0.98,
        maxSpeed: 0.5,
        turnSpeed: 0.03,
        angle: 0
    };

    init();

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.05);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // Постобработка Bloom
        const renderPass = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        composer = new EffectComposer(renderer);
        composer.addPass(renderPass);
        composer.addPass(bloomPass);

        // Свет
        const ambient = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xff00ff, 1);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        createCity();
        createPlayerCar();

        window.addEventListener('keydown', (e) => handleKey(e.code, true));
        window.addEventListener('keyup', (e) => handleKey(e.code, false));
        window.addEventListener('resize', onWindowResize);

        document.getElementById('loading').style.display = 'none';
        animate();
    }

    function createCity() {
        cityGroup = new THREE.Group();
        const roadGeo = new THREE.PlaneGeometry(200, 200);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x111115 });
        const ground = new THREE.Mesh(roadGeo, roadMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Сетка дорог
        const grid = new THREE.GridHelper(200, 40, 0x00ffff, 0x222222);
        grid.position.y = 0.01;
        scene.add(grid);

        // Генерация зданий
        for (let i = 0; i < 60; i++) {
            const h = 5 + Math.random() * 15;
            const w = 2 + Math.random() * 3;
            const geo = new THREE.BoxGeometry(w, h, w);
            
            // Материал здания с неоновыми окнами
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x050505,
                emissive: new THREE.Color(Math.random() > 0.5 ? 0x00ffff : 0xff00ff),
                emissiveIntensity: Math.random() * 0.5
            });

            const b = new THREE.Mesh(geo, mat);
            
            // Расстановка по сетке (чтобы не на дорогах)
            b.position.x = (Math.floor(Math.random() * 20) - 10) * 8;
            b.position.z = (Math.floor(Math.random() * 20) - 10) * 8;
            b.position.y = h / 2;
            
            if (Math.abs(b.position.x) < 5 && Math.abs(b.position.z) < 5) continue; // Пусто в центре

            buildings.push(b);
            scene.add(b);
        }
    }

    function createPlayerCar() {
        const carGroup = new THREE.Group();

        // Кузов
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.5, 2.2),
            new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.2 })
        );
        body.position.y = 0.4;
        carGroup.add(body);

        // Кабина
        const roof = new THREE.Mesh(
            new THREE.BoxGeometry(1, 0.4, 1.2),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        roof.position.set(0, 0.8, -0.2);
        carGroup.add(roof);

        // Фары (светящиеся)
        const lightGeo = new THREE.BoxGeometry(0.3, 0.1, 0.1);
        const headLightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const L1 = new THREE.Mesh(lightGeo, headLightMat);
        L1.position.set(0.4, 0.4, 1.1);
        carGroup.add(L1);

        const L2 = L1.clone();
        L2.position.x = -0.4;
        carGroup.add(L2);

        // Задние огни
        const tailLightMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const T1 = new THREE.Mesh(lightGeo, tailLightMat);
        T1.position.set(0.4, 0.4, -1.1);
        carGroup.add(T1);

        car = carGroup;
        scene.add(car);
    }

    function handleKey(code, isDown) {
        if (code === 'KeyW' || code === 'ArrowUp') input.forward = isDown;
        if (code === 'KeyS' || code === 'ArrowDown') input.backward = isDown;
        if (code === 'KeyA' || code === 'ArrowLeft') input.left = isDown;
        if (code === 'KeyD' || code === 'ArrowRight') input.right = isDown;
    }

    function updatePhysics() {
        if (input.forward) carPhysics.speed += carPhysics.acceleration;
        if (input.backward) carPhysics.speed -= carPhysics.acceleration;

        carPhysics.speed *= carPhysics.friction;

        if (Math.abs(carPhysics.speed) > 0.01) {
            const direction = carPhysics.speed > 0 ? 1 : -1;
            if (input.left) carPhysics.angle += carPhysics.turnSpeed * direction;
            if (input.right) carPhysics.angle -= carPhysics.turnSpeed * direction;
        }

        // Движение
        car.position.x += Math.sin(carPhysics.angle) * carPhysics.speed;
        car.position.z += Math.cos(carPhysics.angle) * carPhysics.speed;
        car.rotation.y = carPhysics.angle;

        // Эффект наклона при повороте
        car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, (input.left ? 0.1 : input.right ? -0.1 : 0), 0.1);

        // Камера следует за авто
        const camOffset = new THREE.Vector3(0, 3, -7);
        camOffset.applyQuaternion(car.quaternion);
        camera.position.lerp(car.position.clone().add(camOffset), 0.1);
        camera.lookAt(car.position);

        // UI
        document.getElementById('speed').innerText = Math.round(Math.abs(carPhysics.speed) * 300) + " KM/H";
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        composer.render();
    }
</script>
</body>
</html>
