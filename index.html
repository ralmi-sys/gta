<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk GTA 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #0ff;
            text-shadow: 0 0 10px #0ff; pointer-events: none; z-index: 10;
        }
        .hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #fff; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; border: 1px solid #0ff; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid #0ff; transform: translate(-50%, -50%); border-radius: 50%; display: none; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 24px; font-weight: bold;">NEON DISTRICT</div>
    <div id="status">ON FOOT</div>
    <div id="speed" style="display:none;">0 KM/H</div>
</div>

<div id="crosshair"></div>
<div class="hint" id="hint">WASD - Move | F - Enter/Exit Car | Space - Jump/Brake</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
    let scene, camera, renderer, composer, clock;
    let worldGrid = 160;
    let citySize = 1000;
    
    // Сущности
    let player, car, currentMode = 'foot'; // 'foot' или 'car'
    let buildings = [], traffic = [];
    let keys = {};

    // Физика и параметры
    const params = {
        playerSpeed: 0.15,
        carSpeed: 0,
        carMaxSpeed: 0.8,
        carAccel: 0.008,
        carTurn: 0.04
    };

    init();

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.03);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // Постобработка (Bloom)
        const renderPass = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.8);
        composer = new EffectComposer(renderer);
        composer.addPass(renderPass);
        composer.addPass(bloomPass);

        // Освещение
        scene.add(new THREE.AmbientLight(0x404040, 0.5));
        const dirLight = new THREE.DirectionalLight(0xff00ff, 0.5);
        dirLight.position.set(100, 100, 50);
        scene.add(dirLight);

        setupWorld();
        setupPlayer();
        setupCar();
        setupTraffic();

        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyF') toggleMode(); });
        window.addEventListener('keyup', e => { keys[e.code] = false; });
        window.addEventListener('resize', onWindowResize);

        animate();
    }

    function setupWorld() {
        // Пол (Асфальт)
        const planeGeo = new THREE.PlaneGeometry(citySize, citySize);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });
        const ground = new THREE.Mesh(planeGeo, planeMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Сетка дорог
        const grid = new THREE.GridHelper(citySize, 50, 0x00ffff, 0x222222);
        grid.position.y = 0.05;
        scene.add(grid);

        // Генерация зданий
        for (let i = 0; i < 150; i++) {
            const h = 20 + Math.random() * 60;
            const w = 10 + Math.random() * 10;
            const geo = new THREE.BoxGeometry(w, h, w);
            const color = new THREE.Color().setHSL(Math.random() * 0.2 + 0.5, 1, 0.5);
            
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x0a0a0a,
                emissive: color,
                emissiveIntensity: Math.random() * 0.4
            });

            const b = new THREE.Mesh(geo, mat);
            
            // Расстановка вне дорог
            let x = (Math.random() - 0.5) * citySize;
            let z = (Math.random() - 0.5) * citySize;
            // Простое избегание "дорог" на сетке 20м
            x = Math.round(x / 20) * 20 + 10;
            z = Math.round(z / 20) * 20 + 10;

            b.position.set(x, h/2, z);
            buildings.push(b);
            scene.add(b);
        }
    }

    function setupPlayer() {
        const geo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
        const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        player = new THREE.Mesh(geo, mat);
        player.position.set(0, 1, 5);
        scene.add(player);
    }

    function setupCar() {
        car = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(2, 0.8, 4),
            new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.5 })
        );
        body.position.y = 0.6;
        car.add(body);

        // Фары
        const headLight = new THREE.PointLight(0xffffff, 10, 20);
        headLight.position.set(0, 0.5, 2.1);
        car.add(headLight);

        car.position.set(5, 0, 10);
        scene.add(car);
    }

    function setupTraffic() {
        for(let i=0; i<20; i++) {
            const tCar = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1, 4),
                new THREE.MeshStandardMaterial({ color: 0xff0055 })
            );
            tCar.position.set((Math.random()-0.5)*citySize, 0.5, (Math.random()-0.5)*citySize);
            tCar.userData.speed = 0.2 + Math.random() * 0.2;
            traffic.push(tCar);
            scene.add(tCar);
        }
    }

    function toggleMode() {
        const dist = player.position.distanceTo(car.position);
        if (currentMode === 'foot' && dist < 5) {
            currentMode = 'car';
            player.visible = false;
            document.getElementById('status').innerText = 'DRIVING';
            document.getElementById('speed').style.display = 'block';
            document.getElementById('crosshair').style.display = 'none';
        } else if (currentMode === 'car') {
            currentMode = 'foot';
            player.visible = true;
            player.position.copy(car.position).add(new THREE.Vector3(3, 1, 0));
            document.getElementById('status').innerText = 'ON FOOT';
            document.getElementById('speed').style.display = 'none';
        }
    }

    function updatePhysics() {
        if (currentMode === 'foot') {
            // Движение игрока
            if (keys['KeyW']) player.position.z -= Math.cos(player.rotation.y) * params.playerSpeed;
            if (keys['KeyS']) player.position.z += Math.cos(player.rotation.y) * params.playerSpeed;
            if (keys['KeyA']) player.rotation.y += 0.05;
            if (keys['KeyD']) player.rotation.y -= 0.05;

            // Камера пешком
            const camTarget = player.position.clone().add(new THREE.Vector3(
                Math.sin(player.rotation.y) * 10, 
                5, 
                Math.cos(player.rotation.y) * 10
            ));
            camera.position.lerp(camTarget, 0.1);
            camera.lookAt(player.position);
        } else {
            // Движение машины
            if (keys['KeyW']) params.carSpeed += params.carAccel;
            if (keys['KeyS']) params.carSpeed -= params.carAccel;
            
            params.carSpeed *= 0.98; // Трение

            if (Math.abs(params.carSpeed) > 0.01) {
                const dir = params.carSpeed > 0 ? 1 : -1;
                if (keys['KeyA']) car.rotation.y += params.carTurn * dir;
                if (keys['KeyD']) car.rotation.y -= params.carTurn * dir;
            }

            car.translateZ(params.carSpeed);
            
            // Камера в машине
            const relativeCameraOffset = new THREE.Vector3(0, 5, -12);
            const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(car.position);

            document.getElementById('speed').innerText = Math.round(Math.abs(params.carSpeed) * 200) + ' KM/H';
        }

        // Обновление трафика
        traffic.forEach(t => {
            t.translateZ(t.userData.speed);
            if(t.position.length() > citySize/2) t.position.set((Math.random()-0.5)*citySize, 0.5, (Math.random()-0.5)*citySize);
        });
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        composer.render();
    }
</script>
</body>
</html>
